<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f12" />
  <title>Raitsikat — HSL Trams, Live</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="map" aria-label="Live map of Helsinki trams"></div>

  <header id="topbar">
    <div class="brand">
      <h1>Raitsikat</h1>
      <p class="brand__sub">HSL trams · live</p>
    </div>
  </header>

  <section id="sheet" aria-label="Tram line filter">
    <button id="sheet-toggle" aria-expanded="false" aria-controls="sheet-body">
      <span class="sheet__handle" aria-hidden="true"></span>
      <span class="sheet__title">Lines</span>
      <span class="sheet__count" id="tram-count">0 trams</span>
    </button>
    <div id="sheet-body">
      <div class="sheet__actions">
        <button type="button" id="toggle-all" class="ghost-btn">Hide all</button>
      </div>
      <div id="line-filter" role="group" aria-label="Show or hide tram lines"></div>
      <p class="sheet__footnote">
        Data: <a href="https://hsl.fi/en/hsl/open-data" target="_blank" rel="noopener">HSL HFP</a> ·
        Tiles: <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>
      </p>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/app.js"></script>
</body>
</html>
